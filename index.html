<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Says Game</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="title">Simon Says Game</div>

    <div class="scoreboard">
        <h2>Your Score</h2>
    </div>

    <div class="game">
        <div class="lineone">
            <div type="button" class="box box1"></div>
            <div type="button" class="box box2"></div>
        </div>
        <div class="linetwo">
            <div type="button" class="box box3"></div>
            <div type="button" class="box box4"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
